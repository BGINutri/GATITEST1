            "SATI": { nickname: "真香循环", slogan: "吃完这顿就不吃了.....吗？", desc: "S娇嫩敏感让你吃重口必翻车，T规律顺畅、I屏障稳固又让你恢复得很快，A外补依赖说明你总是忍不住顿顿外卖甜品，每次大吃特吃都疼得直不起腰，含泪立下“吃完这顿就不吃了”的 flag，转头看到美食又秒变“真香”现场，主打一个好了伤疤忘了疼。下次嘴馋的时候记得备点益生菌，给肠道加层保护哦！" },
            "SATD": { nickname: "摆烂人", slogan: "不主动、不拒绝、不负责", desc: "S 娇嫩敏感让你肠道本就脆弱，T 规律顺畅是你唯一的肠道底气，而A外补依赖、D屏障受损，你活成了对肠道健康摆烂的吗喽！秉持 “不主动、不拒绝、不负责” 的三不原则，不主动调整饮食，不拒绝重油重糖，不负责肠道出问题的后果。别摆烂啦，稍微用点心养肠，你的肠道会给你大大的惊喜！" },
            "SAUI": { nickname: "咸鱼·不翻身版", slogan: "房子着火我拍照，人生乱套我睡觉", desc: "S 娇嫩敏感让你肠道容易闹脾气，I 屏障稳固又让你不会出大问题，U 节律紊乱让排便成了随缘事件，你是个躺平的佛系休息者！肠道胀气就揉揉，腹泻就躺平，秉持 “房子着火我拍照，人生乱套我睡觉” 的心态，主打一个随遇而安。虽然心态很好，但偶尔还是要给肠道喂点粗粮蔬菜，不要一直A 外补依赖，别让它太孤单哦！" },
            "SAUD": { nickname: "终身进步者", slogan: "恭喜您！您拥有百分之九十九点九九的上升空间", desc: "虽然你目前集齐了 S 娇嫩敏感、A 外补依赖、U 节律紊乱、D 屏障受损四大挑战，但这也意味着你是肠道界的终身进步者、潜能无限家！恭喜您！您拥有百分之九十九点九九的上升空间，每一个小小的养肠举动，都会带来巨大的改善。从今天开始，慢慢调整饮食、规律作息、少点压力，你的肠道会一步步变得越来越好，未来可期哦！" }
        };

        // 16道题目 (基于问卷)
        function getLikertOptions() {
            return [
                { text: "完全不符合", score: 1 },
                { text: "比较不符合", score: 2 },
                { text: "不确定", score: 3 },
                { text: "比较符合", score: 4 },
                { text: "完全符合", score: 5 }
            ];
        }
        const questions = [
            { dim:0, text: "饮食大杂烩挑战：我可以冷热混吃（如火锅配冰饮）或尝试爆辣、重油食物，且事后肠胃基本无感。", options: getLikertOptions() },
            { dim:0, text: "环境适应力：换城市出差、旅游或更换常喝的水品牌/外卖店时，我几乎不会出现水土不服或拉肚子的情况。", options: getLikertOptions() },
            { dim:0, text: "极端压力测试：即使偶尔暴饮暴食、应酬喝酒或因为忙碌饥一顿饱一顿，我的肠道也不会立刻“罢工”或翻车。", options: getLikertOptions() },
            { dim:0, text: "情绪波动免疫：在面对考试、演讲或工作高压时，我的肠道很淡定，不会因为紧张焦虑而频繁跑厕所。", options: getLikertOptions() },
            { dim:1, text: "食材天然度：我的日常餐食多为亲手烹饪或健康的天然食材，极少依赖外卖、方便面或高添加剂的预制菜。", options: getLikertOptions() },
            { dim:1, text: "膳食纤维密度：我每天都能摄入足量的深色蔬菜、全谷物（粗粮/杂豆）和新鲜果蔬，而不是纯肉主义。", options: getLikertOptions() },
            { dim:1, text: "补剂依赖度：我的肠道很舒服，不需要长期靠益生菌、纤维粉等外源补剂来维持日常代谢。", options: getLikertOptions() },
            { dim:1, text: "结构稳定性：我的饮食结构非常规律，不会为了减肥而极端节食或戒掉碳水。", options: getLikertOptions() },
            { dim:2, text: "排便生物钟：我有非常固定的排便习惯（如晨起或餐后），每天1-2次，且过程顺畅，不会在马桶上“长跑”。", options: getLikertOptions() },
            { dim:2, text: "事后反馈：每次排便后感觉非常轻松、排得干净，便便成型且软硬适中，基本不会出现粘马桶或里急后重感。", options: getLikertOptions() },
            { dim:2, text: "日常腹感：饭后我极少感到肚子胀气、鼓胀或出现明显的“肠鸣”声，小腹常年处于平坦舒畅的状态。", options: getLikertOptions() },
            { dim:2, text: "节律韧性：即使偶尔熬夜或作息变动，我的肠道也能在1天内恢复排便规律，不会陷入数天不排或无预兆腹泻。", options: getLikertOptions() },
            { dim:3, text: "睡眠与昼夜节律：我作息规律，很少熬夜，每天能保证高质量且充足的睡眠，且没有长期黑白颠倒。", options: getLikertOptions() },
            { dim:3, text: "药物史与炎症：近三个月内我没有使用过抗生素、止痛药或激素类药物，且没有频繁发作的肠胃炎史。", options: getLikertOptions() },
            { dim:3, text: "情绪与内耗：我的情绪状态长期稳定，很少处于极度高压、焦虑或抑郁的心理内耗中。", options: getLikertOptions() },
            { dim:3, text: "系统性表现：我的皮肤状态稳定（不易爆痘），身体免疫力好（不易过敏/感冒），且全天精力充沛，少有疲劳感。", options: getLikertOptions() }
        ];

        let currentIndex = 0;
        let answers = new Array(questions.length).fill(null);
        let testCompleted = false;

        // DOM
        const testSection = document.getElementById('testSection');
        const resultSection = document.getElementById('resultSection');
        const questionText = document.getElementById('questionText');
        const questionNumLabel = document.getElementById('questionNumLabel');
        const dimensionName = document.getElementById('dimensionName');
        const dimensionRange = document.getElementById('dimensionRange');
        const optionsDiv = document.getElementById('optionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const restartTestBtn = document.getElementById('restartTestBtn');
        const retakeFromResultBtn = document.getElementById('retakeFromResultBtn');
        const progressText = document.getElementById('progressText');
        const progressFill = document.getElementById('progressFill');
        const resultTypeCode = document.getElementById('resultTypeCode');
        const resultNickname = document.getElementById('resultNickname');
        const resultSlogan = document.getElementById('resultSlogan');
        const typeDescription = document.getElementById('typeDescription');
        const dimensionBars = document.getElementById('dimensionBars');
        const imagePlaceholder = document.getElementById('imagePlaceholder');

        function updateProgress() {
            const answeredCount = answers.filter(v => v !== null).length;
            const percent = (answeredCount / questions.length) * 100;
            if(progressFill) progressFill.style.width = percent + '%';
            if(progressText) progressText.innerText = `${answeredCount} / ${questions.length}`;
        }

        function renderQuestion() {
            const q = questions[currentIndex];
            const dim = dimensions[q.dim];
            dimensionName.innerText = dim.name;
            dimensionRange.innerText = `${dim.left} ⇄ ${dim.right}`;
            questionNumLabel.innerText = `第 ${currentIndex+1} / 16 题`;
            questionText.innerText = q.text;
            const selectedScore = answers[currentIndex];
            let html = '';
            q.options.forEach(opt => {
                const isSelected = (selectedScore === opt.score);
                html += `<div class="option-btn ${isSelected ? 'selected' : ''}" data-score="${opt.score}">
                            <span class="option-score">${opt.score}</span>
                            <span class="option-text">${opt.text}</span>
                         </div>`;
            });
            optionsDiv.innerHTML = html;
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const scoreVal = parseInt(btn.dataset.score);
                    answers[currentIndex] = scoreVal;
                    renderQuestion();
                    updateProgress();
                    updateNavButtons();
                });
            });
            updateNavButtons();
        }

        function updateNavButtons() {
            prevBtn.disabled = (currentIndex === 0);
            const hasAnswer = answers[currentIndex] !== null;
            if(currentIndex === questions.length-1) {
                nextBtn.innerHTML = '查看肠格 <i class="fas fa-check-circle"></i>';
            } else {
                nextBtn.innerHTML = '下一题 <i class="fas fa-arrow-right"></i>';
            }
            nextBtn.disabled = !hasAnswer;
        }

        function goToPrev() { if(currentIndex > 0) { currentIndex--; renderQuestion(); } }
        function goToNext() {
            if(answers[currentIndex] === null) return;
            if(currentIndex === questions.length-1) finishTest();
            else { currentIndex++; renderQuestion(); }
        }

        function finishTest() {
            if(answers.includes(null)) {
                alert("请完成所有16道题目，解锁完整肠格报告~");
                const firstNull = answers.findIndex(a => a === null);
                if(firstNull !== -1) { currentIndex = firstNull; renderQuestion(); }
                return;
            }
            // 计算分数
            let rawScores = [0,0,0,0];
            for(let i=0; i<questions.length; i++) {
                let score = answers[i];
                let dimIdx = questions[i].dim;
                rawScores[dimIdx] += score;
            }
            const typeChars = [];
            for(let i=0;i<4;i++) {
                typeChars.push(rawScores[i] > 12 ? dimensions[i].left : dimensions[i].right);
            }
            const finalCode = typeChars.join('');
            const typeData = typeMap[finalCode] || { nickname: "神秘肠格", slogan: "待解锁", desc: "独特肠道人格。" };
            
            resultTypeCode.innerText = finalCode;
            resultNickname.innerText = typeData.nickname;
            resultSlogan.innerText = typeData.slogan;
            typeDescription.innerText = typeData.desc;
            // 根据最终型号生成图片路径（假设图片放在 images/gut_personas/ 下）
            const imagePath = `images/gut_personas/${finalCode}.jpg`;
            // 插入 img 标签，并添加一个友好的备用文本
            imagePlaceholder.innerHTML = `
                <img 
                    src="${imagePath}" 
                    alt="${typeData.nickname} 肠格小人"
                    style="max-width: 100%; max-height: 180px; border-radius: 28px; margin: 8px 0;"
                    onerror="this.onerror=null; this.src=''; this.alt='图片未找到'; this.parentNode.innerHTML='<i class=\'fas fa-image\'></i> 肠格画像暂缺';"
                >`;
            
            // 绘制条状图 (不再额外显示独立分数列表)
            renderDimensionBars(rawScores);

            // ========== 静默提交数据到 Google Sheets ==========
            const scriptUrl = 'https://script.google.com/macros/s/AKfycbx_D6BTCVoTyFCcU2PaSPNGLgCMs7r-8asd6OZ6d0_p-w8IpyPCas6Jgz5IVhSXrVSe0Q/exec'; // 替换这里！！！
    
            let sessionId = sessionStorage.getItem('submitted_session');
            if (!sessionId) {
                sessionId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                sessionStorage.setItem('submitted_session', sessionId);
            }
            const submitData = {
                sessionId: sessionId,
                answers: answers,
                scores: rawScores,
                finalCode: finalCode
            };
            fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(submitData)
            }).catch(e => console.log('数据提交失败', e));
            // ========== 结束静默提交 ==========
    
            
            testSection.classList.add('hidden');
            resultSection.classList.remove('hidden');
        }

        function renderDimensionBars(scores) {
            if(!dimensionBars) return;
            const maxScore = 20;
            const createBar = (dimIdx, leftLabel, rightLabel, score) => {
                const leftPercent = (score / maxScore) * 100;
                const rightPercent = 100 - leftPercent;
                return `<div class="dimension-item">
                            <div class="dimension-label"><span>${leftLabel} (${score}分)</span><span>${rightLabel} (${maxScore-score}分)</span></div>
                            <div class="bar-container">
                                <span class="bar-left">${dimensions[dimIdx].left}</span>
                                <div class="bar-bg"><div class="bar-fill-left" style="width:${leftPercent}%;"></div><div class="bar-fill-right" style="width:${rightPercent}%;"></div></div>
                                <span class="bar-right">${dimensions[dimIdx].right}</span>
                            </div>
                         </div>`;
            };
            dimensionBars.innerHTML = 
                createBar(0, 'G 强韧耐造', 'S 娇嫩敏感', scores[0]) +
                createBar(1, 'N 内源自给', 'A 外补依赖', scores[1]) +
                createBar(2, 'T 规律顺畅', 'U 节律紊乱', scores[2]) +
                createBar(3, 'I 稳固完整', 'D 屏障受损', scores[3]);
        }

        function resetTest() {
            if(confirm('重新测试将会清空所有进度，确定重测吗？')) {
                currentIndex = 0;
                answers = new Array(questions.length).fill(null);
                testCompleted = false;
                // 清除提交标志，允许重新提交
                delete window._dataSubmitted;
                // 清除会话ID，生成新的（可选，也可以保留旧的）
                sessionStorage.removeItem('submitted_session');
                testSection.classList.remove('hidden');
                resultSection.classList.add('hidden');
                renderQuestion();
                updateProgress();
            }
        }

        prevBtn.addEventListener('click', goToPrev);
        nextBtn.addEventListener('click', goToNext);
        restartTestBtn.addEventListener('click', resetTest);
        retakeFromResultBtn.addEventListener('click', resetTest);
        window.addEventListener('keydown', (e) => {
            if(!testSection.classList.contains('hidden')) {
                if(e.key === 'ArrowLeft' && !prevBtn.disabled) goToPrev();
                else if(e.key === 'ArrowRight' && !nextBtn.disabled) goToNext();
            }
        });
        renderQuestion();
        updateProgress();
    })();
</script>
</body>
</html>
